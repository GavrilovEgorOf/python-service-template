apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "python-service-template.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "python-service-template.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "python-service-template.name" . }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "python-service-template.fullname" . }}-secrets
                  key: databaseUrl
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "python-service-template.fullname" . }}-secrets
                  key: redisUrl
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "python-service-template.fullname" . }}-secrets
                  key: apiKey
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "python-service-template.fullname" . }}-secrets
                  key: jwtSecretKey
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.livenessPath }}
              port: 8000
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath }}
              port: 8000
