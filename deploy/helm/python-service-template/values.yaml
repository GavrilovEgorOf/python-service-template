replicaCount: 2

image:
  repository: ghcr.io/example/python-service-template
  tag: "0.5.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  ENVIRONMENT: production
  DEBUG: "false"
  AUTH_DISABLED: "false"
  METRICS_ENABLED: "true"
  RATE_LIMIT_ENABLED: "true"
  AUDIT_LOG_ENABLED: "true"
  AUDIT_LOG_PERSIST: "true"
  OTEL_ENABLED: "true"
  OTEL_INSECURE: "false"

secrets:
  apiKey: ""
  jwtSecretKey: ""
  metricsApiKey: ""
  databaseUrl: ""
  redisUrl: ""

probes:
  livenessPath: /health/live
  readinessPath: /health/ready
