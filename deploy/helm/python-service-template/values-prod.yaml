replicaCount: 3

env:
  ENVIRONMENT: production
  DEBUG: "false"
  LOG_JSON: "true"
  AUDIT_LOG_PERSIST: "true"
  OTEL_INSECURE: "false"
  CORS_ORIGINS: "https://app.example.com"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

ingress:
  enabled: true

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
