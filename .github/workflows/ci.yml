name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check app tests
      - name: Ruff format
        run: ruff format --check app tests
      - name: Mypy
        run: mypy app
      - name: Bandit
        run: bandit -r app -c pyproject.toml
      - name: pip-audit
        run: pip-audit

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: pytest tests/unit --cov=app --cov-report=term-missing

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/app
      REDIS_URL: redis://localhost:6379/0
      AUTH_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run migrations
        run: alembic upgrade head
      - name: Integration tests
        run: pytest tests/integration -m integration

  openapi:
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e .
      - name: Export OpenAPI schema
        run: |
          python - <<'PY'
          import json
          from app.main import create_app
          app = create_app()
          schema = app.openapi()
          with open("openapi.json", "w", encoding="utf-8") as fh:
              json.dump(schema, fh, indent=2)
          print("openapi.json written")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: openapi.json
